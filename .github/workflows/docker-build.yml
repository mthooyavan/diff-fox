name: Docker Build
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "action/**"
      - "src/**"
  pull_request:
    paths:
      - "Dockerfile"
      - "action/**"
      - "src/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t diff-fox:test .

      - name: Smoke test
        run: |
          docker run --rm --entrypoint python diff-fox:test -c "
          import sys; sys.path.insert(0, '/app/src');
          from diff_fox.models import Finding, ReviewFindings;
          from diff_fox.constants import ALL_AGENT_NAMES;
          print(f'Agents: {ALL_AGENT_NAMES}');
          print('Smoke test passed')
          "
